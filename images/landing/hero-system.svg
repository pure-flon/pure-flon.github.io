<svg width="1200" height="780" viewBox="0 0 1200 780" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1E3A"/>
      <stop offset="50%" stop-color="#163E72"/>
      <stop offset="100%" stop-color="#2D7CBF"/>
    </linearGradient>
    <linearGradient id="tube" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E6EEF7"/>
      <stop offset="100%" stop-color="#B3CBE6"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="780" rx="32" fill="url(#bg)"/>
  <circle cx="1030" cy="120" r="180" fill="#4BA4E4" opacity="0.2"/>
  <circle cx="180" cy="690" r="220" fill="#5EC2FF" opacity="0.18"/>

  <rect x="150" y="190" width="420" height="38" rx="19" fill="url(#tube)" filter="url(#glow)"/>
  <rect x="520" y="190" width="90" height="38" rx="19" fill="#F3F8FF"/>
  <rect x="610" y="190" width="300" height="38" rx="19" fill="url(#tube)" filter="url(#glow)"/>

  <rect x="260" y="320" width="510" height="34" rx="17" fill="url(#tube)"/>
  <rect x="740" y="320" width="190" height="34" rx="17" fill="#EAF2FC"/>

  <rect x="250" y="450" width="280" height="32" rx="16" fill="#EAF2FC"/>
  <rect x="510" y="450" width="420" height="32" rx="16" fill="url(#tube)"/>

  <g opacity="0.9">
    <rect x="180" y="120" width="120" height="56" rx="12" fill="#0A2C55" stroke="#6FB7F1"/>
    <text x="240" y="154" text-anchor="middle" fill="#D7E9FA" font-size="20" font-family="Arial">QA</text>
    <rect x="860" y="560" width="180" height="72" rx="14" fill="#0A2C55" stroke="#6FB7F1"/>
    <text x="950" y="598" text-anchor="middle" fill="#D7E9FA" font-size="22" font-family="Arial">Ops Node</text>
  </g>

  <text x="80" y="88" fill="#E8F3FF" font-size="30" font-family="Arial" font-weight="700">Pure-Flon Process Visualization</text>
</svg>
