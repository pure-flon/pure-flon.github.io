<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1208"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="6" fill="url(#accent)"/>
  <circle cx="900" cy="315" r="220" fill="#f59e0b" opacity="0.05"/>
  <circle cx="200" cy="100" r="80" fill="#f59e0b" opacity="0.04"/>
  <!-- City emojis -->
  <text x="140" y="260" font-size="100" text-anchor="middle" dominant-baseline="middle" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">🏙️</text>
  <text x="300" y="360" font-size="80" text-anchor="middle" dominant-baseline="middle" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">🗼</text>
  <text x="140" y="440" font-size="80" text-anchor="middle" dominant-baseline="middle" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">🌆</text>
  <text x="420" y="300" font-size="70" text-anchor="middle" dominant-baseline="middle" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">🏛️</text>
  <!-- Title -->
  <text x="840" y="210" font-size="54" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Capital City Quiz</text>
  <text x="840" y="278" font-size="32" fill="#fbbf24" text-anchor="middle" dominant-baseline="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">195 Countries 🏙️</text>
  <rect x="620" y="332" width="440" height="2" fill="#f59e0b" opacity="0.4"/>
  <text x="840" y="382" font-size="27" fill="#d4d4d8" text-anchor="middle" dominant-baseline="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Name the capital city — can you get all?</text>
  <text x="840" y="422" font-size="27" fill="#d4d4d8" text-anchor="middle" dominant-baseline="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Timed mode · Relaxed mode · Free</text>
  <text x="600" y="580" font-size="24" fill="#52525b" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">pure-flon.com/games/capital-city-quiz/</text>
  <rect y="624" width="1200" height="6" fill="url(#accent)"/>
</svg>
