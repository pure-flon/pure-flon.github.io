  <text x="840" y="422" font-size="27" fill="#d4d4d8" text-anchor="middle" dominant-baseline="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">50+ memes · streak system · share score</text>
  <text x="600" y="580" font-size="24" fill="#52525b" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">pure-flon.com/games/k-meme-quiz/</text>
