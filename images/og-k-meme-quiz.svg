      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a0a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#f43f5e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="6" fill="url(#accent)"/>
  <circle cx="880" cy="280" r="200" fill="#ec4899" opacity="0.06"/>
  <circle cx="150" cy="500" r="100" fill="#f43f5e" opacity="0.04"/>
  <!-- Korean/meme emojis -->
  <text x="140" y="240" font-size="110" text-anchor="middle" dominant-baseline="middle" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">😂</text>
  <text x="300" y="350" font-size="90" text-anchor="middle" dominant-baseline="middle" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">🇰🇷</text>
  <text x="430" y="250" font-size="80" text-anchor="middle" dominant-baseline="middle" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">📱</text>
  <text x="200" y="450" font-size="70" text-anchor="middle" dominant-baseline="middle" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">🔥</text>
  <!-- Title -->
  <text x="840" y="210" font-size="58" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">K-Meme Quiz</text>
  <text x="840" y="278" font-size="32" fill="#f9a8d4" text-anchor="middle" dominant-baseline="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Korean Internet Culture 🇰🇷</text>
  <rect x="620" y="332" width="440" height="2" fill="#ec4899" opacity="0.4"/>
