<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Accent bar top -->
  <rect width="1200" height="6" fill="url(#accent)"/>
  <!-- Decorative circles -->
  <circle cx="950" cy="150" r="180" fill="#6366f1" opacity="0.07"/>
  <circle cx="250" cy="480" r="120" fill="#8b5cf6" opacity="0.05"/>
  <!-- Robot emoji area -->
  <text x="160" y="270" font-size="120" text-anchor="middle" dominant-baseline="middle" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">🤖</text>
  <text x="340" y="270" font-size="80" text-anchor="middle" dominant-baseline="middle" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">🆚</text>
  <text x="520" y="270" font-size="120" text-anchor="middle" dominant-baseline="middle" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">👤</text>
  <!-- Title -->
  <text x="840" y="220" font-size="62" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">AI or Human?</text>
  <!-- Subtitle -->
  <text x="840" y="300" font-size="36" fill="#a1a1aa" text-anchor="middle" dominant-baseline="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Can you tell the difference?</text>
  <!-- Divider -->
  <rect x="600" y="360" width="480" height="2" fill="#6366f1" opacity="0.5"/>
  <!-- Description -->
  <text x="840" y="410" font-size="28" fill="#d4d4d8" text-anchor="middle" dominant-baseline="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">15 rounds — code, emails, git commits</text>
  <text x="840" y="450" font-size="28" fill="#d4d4d8" text-anchor="middle" dominant-baseline="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Reddit comments &amp; Slack messages</text>
  <!-- Branding -->
  <text x="600" y="580" font-size="24" fill="#52525b" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">pure-flon.com/games/ai-or-human/</text>
  <!-- Bottom accent -->
  <rect y="624" width="1200" height="6" fill="url(#accent)"/>
</svg>
